stages:
  - .pre
  - tests
  - build
  - deploy

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  # uses registry.gitlab.syncad.com/hive/hive/ci-base-image:ubuntu22.04-8
  CI_BASE_IMAGE_TAG: "@sha256:924cb31153b5512ef0263ac18ea57d0d36559a284154ee081e8d6b3e68b4b640"
  CI_BASE_IMAGE: "registry.gitlab.syncad.com/hive/hive/ci-base-image${CI_BASE_IMAGE_TAG}"

include:
  - project: 'hive/common-ci-configuration'
    ref: 5bf5c96f868f4a225705d13c0f8512ec36e9e2e1
    file:
      - '/templates/npm_projects.gitlab-ci.yml'
      - 'templates/python_projects.gitlab-ci.yml'

image: "${CI_BASE_IMAGE}"

default:
  tags:
    - public-runner-docker

lint:
  stage: .pre
  extends: .npm_based_job_base
  script:
    - npm run lint-ci

pre_commit_checks:
  stage: .pre
  extends: .pre_commit_checks_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "${PYPROJECT_DIR}/poetry.lock"


tests:
  stage: tests
  extends: .project_develop_configuration_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks
  script:
    - pytest "${PYPROJECT_DIR}/tests/"

build:
  stage: build
  extends: .npm_build_template
  variables:
    DIST_DIR: "$CI_PROJECT_DIR/dist"
    NPM_PACKAGE_SCOPE: "@hiveio"
    NPM_PACKAGE_NAME: "wax-spec-generator"
  artifacts:
    paths:
      - "${DIST_DIR}/*.tgz"

    when: always
    expire_in: 1 week

build_wheel:
  stage: build
  extends: .build_wheel_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks

deploy_dev_package:
  stage: deploy
  extends: .npm_deploy_package_template
  variables:
    PACKAGE_TGZ_PATH: "${BUILT_PACKAGE_PATH}"
    NPM_PACKAGE_SCOPE: "@hiveio"
  needs:
    - job: lint
    - job: build

deploy_production_public_npm:
  stage: deploy
  extends: .registry_npmjs_org_deploy_package_template
  variables:
    NPM_PUBLISH_TOKEN: "$INTERNAL_HIDDEN_PUBLISH_TOKEN"
    NPM_PACKAGE_NAME: "wax-spec-generator"
    PACKAGE_TGZ_PATH: "${BUILT_PACKAGE_PATH}"
  needs:
    - job: lint
    - job: build

deploy_wheel_to_gitlab:
  stage: deploy
  extends: .deploy_wheel_to_gitlab_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks
    - job: build_wheel
  when: on_success
