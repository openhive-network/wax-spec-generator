stages:
  - .pre
  - tests
  - build
  - deploy

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  # Override to use Python 3.14 base image
  # uses registry.gitlab.syncad.com/hive/hive/ci-base-image:ubuntu24.04-py3.14-1
  PYTHON_IMAGE_TAG: ":ubuntu24.04-py3.14-1"
  PYTHON_IMAGE: "registry.gitlab.syncad.com/hive/hive/ci-base-image${PYTHON_IMAGE_TAG}"
  CI_BASE_IMAGE: "${PYTHON_IMAGE}"

  # Set to "true" to run poetry update and test with latest dependency versions
  UPDATE_LATEST_DEPS: "false"

include:
  - template: Workflows/Branch-Pipelines.gitlab-ci.yml
  - project: 'hive/common-ci-configuration'
    ref: 8efd11eebb0cf8d95efef436dd23013d2c594c67
    file:
      - '/templates/npm_projects.gitlab-ci.yml'
      - 'templates/python_projects.gitlab-ci.yml'

image: "${PYTHON_IMAGE}"

default:
  tags:
    - public-runner-docker

.python_before_script:
  before_script:
    - echo "Using Python project directory - ${PYPROJECT_DIR}"
    - poetry -C "${PYPROJECT_DIR}" env use python3
    - source $(poetry -C "${PYPROJECT_DIR}" env info --path)/bin/activate
    - python3 -V
    - poetry -C "${PYPROJECT_DIR}" -V
    - pip list
    - |
      if [ "${UPDATE_LATEST_DEPS}" = "true" ]; then
        echo "UPDATE_LATEST_DEPS is enabled - running poetry update to get latest dependencies"
        poetry -C "${PYPROJECT_DIR}" update
      fi
    - poetry -C "${PYPROJECT_DIR}" install
    - pip list

lint:
  stage: .pre
  extends: .npm_based_job_base
  script:
    - npm run lint-ci

pre_commit_checks:
  stage: .pre
  extends:
    - .pre_commit_checks_template
    - .python_before_script
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "${PYPROJECT_DIR}/poetry.lock"


tests:
  stage: tests
  extends:
    - .project_develop_configuration_template
    - .python_before_script
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks
  script:
    - pytest "${PYPROJECT_DIR}/tests/"

build:
  stage: build
  extends: .npm_build_template
  variables:
    DIST_DIR: "$CI_PROJECT_DIR/dist"
    NPM_PACKAGE_SCOPE: "@hiveio"
    NPM_PACKAGE_NAME: "wax-spec-generator"
  needs:
    - job: lint

build_wheel:
  stage: build
  extends:
    - .build_wheel_template
    - .python_before_script
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks

# Cross-runner compatible: compute local path from filename
.cross_runner_package_path:
  before_script:
    - !reference [.npm_based_job_base, before_script]
    - PACKAGE_TGZ_PATH="${CI_PROJECT_DIR}/dist/$(basename ${BUILT_PACKAGE_PATH})"
    - echo "Using package at ${PACKAGE_TGZ_PATH}"

deploy_dev_package:
  stage: deploy
  extends:
    - .npm_deploy_package_template
    - .cross_runner_package_path
  variables:
    NPM_PACKAGE_SCOPE: "@hiveio"
  needs:
    - job: lint
    - job: build
      artifacts: true

deploy_production_public_npm:
  stage: deploy
  extends:
    - .registry_npmjs_org_deploy_package_template
    - .cross_runner_package_path
  variables:
    NPM_PUBLISH_TOKEN: "$INTERNAL_HIDDEN_PUBLISH_TOKEN"
    NPM_PACKAGE_NAME: "wax-spec-generator"
  needs:
    - job: deploy_dev_package
    - job: build
      artifacts: true

deploy_wheel_to_gitlab:
  stage: deploy
  extends: .deploy_wheel_to_gitlab_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/python"
  needs:
    - job: pre_commit_checks
    - job: build_wheel
  when: on_success
